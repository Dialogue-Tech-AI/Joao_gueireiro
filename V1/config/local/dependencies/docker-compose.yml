# ============================================================
# Plataforma Guerreiros - Dependências (DESENVOLVIMENTO)
# ============================================================
# Credenciais alinhadas com backend.local.env e ai-worker.local.env
# Uso: docker compose -f config/local/dependencies/docker-compose.yml up -d
# ============================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: joao_guerreiro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: joao_guerreiro
      POSTGRES_PASSWORD: joao_guerreiro123
      POSTGRES_DB: joao_guerreiro
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../../core/shared/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joao_guerreiro -d joao_guerreiro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache and Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: joao_guerreiro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: joao_guerreiro-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: joao_guerreiro
      RABBITMQ_DEFAULT_PASS: joao_guerreiro123
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO S3-compatible Storage
  minio:
    image: minio/minio:latest
    container_name: joao_guerreiro-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: joao_guerreiro
      MINIO_ROOT_PASSWORD: joao_guerreiro
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO Client - Create buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: joao_guerreiro-minio-init
    restart: "no"  # Não reiniciar - é um container de inicialização única
    depends_on:
      minio:
        condition: service_healthy  # Aguardar MinIO estar saudável
    networks:
      - joao_guerreiro-network
    entrypoint: >
      /bin/sh -c "
      echo 'Aguardando MinIO estar pronto...';
      sleep 15;
      echo 'Configurando MinIO client...';
      /usr/bin/mc alias set joao_guerreiro http://minio:9000 joao_guerreiro joao_guerreiro || exit 1;
      echo 'Criando buckets...';
      /usr/bin/mc mb --ignore-existing joao_guerreiro/attachments || exit 1;
      /usr/bin/mc mb --ignore-existing joao_guerreiro/media || exit 1;
      /usr/bin/mc mb --ignore-existing joao_guerreiro/logs || exit 1;
      echo 'Configurando permissões...';
      /usr/bin/mc anonymous set download joao_guerreiro/attachments || exit 1;
      /usr/bin/mc anonymous set download joao_guerreiro/media || exit 1;
      echo 'Inicialização concluída com sucesso!';
      exit 0;
      "

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: joao_guerreiro-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f qdrant || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

# Volumes for data persistence (com prefixo guerreiros- para evitar conflito com outros projetos)
volumes:
  postgres_data:
    name: joao_guerreiro-postgres-data
    driver: local
  redis_data:
    name: joao_guerreiro-redis-data
    driver: local
  rabbitmq_data:
    name: joao_guerreiro-rabbitmq-data
    driver: local
  minio_data:
    name: joao_guerreiro-minio-data
    driver: local
  qdrant_data:
    name: joao_guerreiro-qdrant-data
    driver: local

# Network for inter-service communication (evita conflito com outros projetos)
networks:
  joao_guerreiro-network:
    name: joao_guerreiro-network
    driver: bridge

