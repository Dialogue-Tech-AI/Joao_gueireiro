# ============================================================
# João Guerreiro — VPS (dependências alinhadas ao compose local)
# ============================================================
# Nomes iguais ao config/local/dependencies/docker-compose.yml:
#   joao_guerreiro-postgres, joao_guerreiro-network, volumes joao_guerreiro-*-data
# + serviços app, ai-worker, frontend.
#
# Isolamento na mesma VPS: estes nomes não colidem com outra app que use
# prefixo diferente (ex.: guerreiros-*). Não corras dois stacks com os
# mesmos container_name na mesma máquina (Docker exige nomes únicos).
#
# Uso (a partir de V1):
#   docker compose -f config/vps-isolated/docker-compose.vps.yml --env-file config/vps-isolated/.env up -d --build
#
# Portas no host: iguais às do compose local para Postgres/Redis/Rabbit/MinIO/Qdrant;
# frontend: 8080 (HTTP) e 8443 (HTTPS) para não ocupar 80/443 se já estiverem em uso.
# ============================================================

name: joao-guerreiro-vps

services:
  postgres:
    image: postgres:15-alpine
    container_name: joao_guerreiro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: joao_guerreiro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-joao_guerreiro123}
      POSTGRES_DB: joao_guerreiro
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../core/shared/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joao_guerreiro -d joao_guerreiro"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: joao_guerreiro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: joao_guerreiro-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: joao_guerreiro
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-joao_guerreiro123}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: joao_guerreiro-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: joao_guerreiro
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-joao_guerreiro}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: joao_guerreiro-minio-init
    restart: "no"
    environment:
      MINIO_PASS: ${MINIO_ROOT_PASSWORD:-joao_guerreiro}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - joao_guerreiro-network
    entrypoint: >
      /bin/sh -c "
      echo 'Aguardando MinIO estar pronto...';
      sleep 15;
      echo 'Configurando MinIO client...';
      /usr/bin/mc alias set joao_guerreiro http://minio:9000 joao_guerreiro $$MINIO_PASS || exit 1;
      echo 'Criando buckets...';
      /usr/bin/mc mb --ignore-existing joao_guerreiro/attachments || exit 1;
      /usr/bin/mc mb --ignore-existing joao_guerreiro/media || exit 1;
      /usr/bin/mc mb --ignore-existing joao_guerreiro/logs || exit 1;
      echo 'Configurando permissões...';
      /usr/bin/mc anonymous set download joao_guerreiro/attachments || exit 1;
      /usr/bin/mc anonymous set download joao_guerreiro/media || exit 1;
      echo 'Inicialização concluída com sucesso!';
      exit 0;
      "

  qdrant:
    image: qdrant/qdrant:latest
    container_name: joao_guerreiro-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f qdrant || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  db-init:
    build:
      context: ../../core
      dockerfile: ../config/dockerfiles/db-init.Dockerfile
    container_name: joao_guerreiro-db-init
    restart: "no"
    env_file:
      - ./credentials/backend.vps.env
    environment:
      DB_HOST_DEV: postgres
      REDIS_HOST_DEV: redis
      RABBITMQ_HOST_DEV: rabbitmq
      MINIO_ENDPOINT_DEV: minio
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - joao_guerreiro-network

  app:
    build:
      context: ../../core/services/backend
      dockerfile: ../../../config/dockerfiles/backend.Dockerfile
    container_name: joao_guerreiro-app
    restart: unless-stopped
    env_file:
      - ./credentials/backend.vps.env
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 30s

  ai-worker:
    build:
      context: ../../core/services/ai-worker
      dockerfile: ../../../config/dockerfiles/ai-worker.Dockerfile
    container_name: joao_guerreiro-ai-worker
    restart: unless-stopped
    env_file:
      - ./credentials/ai-worker.vps.env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - joao_guerreiro-network

  frontend:
    build:
      context: ../../core/services/frontend
      dockerfile: ../../../config/dockerfiles/frontend.Dockerfile
    container_name: joao_guerreiro-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - joao_guerreiro-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
    name: joao_guerreiro-postgres-data
    driver: local
  redis_data:
    name: joao_guerreiro-redis-data
    driver: local
  rabbitmq_data:
    name: joao_guerreiro-rabbitmq-data
    driver: local
  minio_data:
    name: joao_guerreiro-minio-data
    driver: local
  qdrant_data:
    name: joao_guerreiro-qdrant-data
    driver: local

networks:
  joao_guerreiro-network:
    name: joao_guerreiro-network
    driver: bridge
