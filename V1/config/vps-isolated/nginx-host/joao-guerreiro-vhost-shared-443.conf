# Incluir no Nginx que já escuta na 443 (ex.: contentor guerreiros-frontend).
# Proxy para o frontend João Guerreiro no HOST — porta 8081 (joao_guerreiro-frontend).
#
# 1) Copiar para o contentor (ajuste o nome do contentor se for outro):
#    docker cp joao-guerreiro-vhost-shared-443.conf guerreiros-frontend:/etc/nginx/conf.d/99-joao-guerreiro.conf
#
# 2) ssl_* abaixo alinham com nginx-ssl.conf do guerreiros-frontend (origin.pem / origin.key).
#    Se o teu Nginx usar outros ficheiros, edita só essas duas linhas.
#
# 3) Testar e recarregar:
#    docker exec guerreiros-frontend nginx -t && docker exec guerreiros-frontend nginx -s reload
#
# Se proxy_pass falhar: a partir do contentor, o host costuma ser 172.17.0.1.
# Alternativa estável (Compose v2): extra_hosts host.docker.internal:host-gateway e usar
# proxy_pass http://host.docker.internal:8081;

map $http_upgrade $joao_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name atendimento-joaoguerreiro.dialoguetech.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name atendimento-joaoguerreiro.dialoguetech.com.br;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://172.17.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $joao_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}
