# Nginx no HOST da VPS — SSL na 443 e proxy para o frontend Docker (8081).
# Instalar: ver install-nginx-host.sh ou README.md nesta pasta.
#
# Hostname: atendimento-joaoguerreiro.dialoguetech.com.br
# Se a 443 já tiver outro site, incorpora estes blocos server { } nesse Nginx.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name atendimento-joaoguerreiro.dialoguetech.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name atendimento-joaoguerreiro.dialoguetech.com.br;

    ssl_certificate     /etc/nginx/ssl/joao-guerreiro/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/joao-guerreiro/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}
