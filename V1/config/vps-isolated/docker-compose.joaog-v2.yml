# ============================================================
# João Guerreiro — stack VPS isolada (2ª instância na mesma máquina)
# ============================================================
# Todos os nomes (projeto Compose, containers, volumes, rede) usam
# prefixo joaog-v2 para não colidir com outra instância (ex.: guerreiros-*).
#
# Execute sempre a partir da pasta V1:
#   cd /caminho/para/Joao_gueireiro/V1
#   docker compose -f config/vps-isolated/docker-compose.joaog-v2.yml up -d --build
#
# Portas no HOST (ajuste se já estiverem em uso):
#   8080  → HTTP do frontend (Nginx)
#   8443  → HTTPS do frontend
#   19000 → MinIO API (opcional; pode omitir o mapeamento)
#   19001 → MinIO Console
#   25672 → RabbitMQ Management
# ============================================================

name: joaog-v2

services:
  postgres:
    image: postgres:15-alpine
    container_name: joaog-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: joaog_v2
      POSTGRES_PASSWORD: ${JOAOG_V2_POSTGRES_PASSWORD:-troque_esta_senha}
      POSTGRES_DB: joaog_v2
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - joaog_v2_postgres_data:/var/lib/postgresql/data
      - ../../core/shared/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - joaog-v2-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joaog_v2 -d joaog_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: joaog-v2-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - joaog_v2_redis_data:/data
    networks:
      - joaog-v2-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: joaog-v2-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: joaog_v2
      RABBITMQ_DEFAULT_PASS: ${JOAOG_V2_RABBITMQ_PASSWORD:-troque_esta_senha}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "25672:15672"
    volumes:
      - joaog_v2_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - joaog-v2-internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: joaog-v2-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: joaog_v2
      MINIO_ROOT_PASSWORD: ${JOAOG_V2_MINIO_PASSWORD:-troque_minio}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - joaog_v2_minio_data:/data
    networks:
      - joaog-v2-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: joaog-v2-minio-init
    restart: "no"
    environment:
      MINIO_PASS: ${JOAOG_V2_MINIO_PASSWORD:-troque_minio}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - joaog-v2-internal
    entrypoint: >
      /bin/sh -c "
      sleep 15;
      /usr/bin/mc alias set joaogv2 http://minio:9000 joaog_v2 $$MINIO_PASS || exit 1;
      /usr/bin/mc mb --ignore-existing joaogv2/attachments || exit 1;
      /usr/bin/mc mb --ignore-existing joaogv2/media || exit 1;
      /usr/bin/mc mb --ignore-existing joaogv2/logs || exit 1;
      /usr/bin/mc anonymous set download joaogv2/attachments || exit 1;
      /usr/bin/mc anonymous set download joaogv2/media || exit 1;
      exit 0;
      "

  qdrant:
    image: qdrant/qdrant:latest
    container_name: joaog-v2-qdrant
    restart: unless-stopped
    volumes:
      - joaog_v2_qdrant_data:/qdrant/storage
    networks:
      - joaog-v2-internal
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f qdrant || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  db-init:
    build:
      context: ../../core
      dockerfile: ../config/dockerfiles/db-init.Dockerfile
    container_name: joaog-v2-db-init
    restart: "no"
    env_file:
      - ./credentials/backend.joaog-v2.env
    environment:
      DB_HOST_DEV: postgres
      REDIS_HOST_DEV: redis
      RABBITMQ_HOST_DEV: rabbitmq
      MINIO_ENDPOINT_DEV: minio
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - joaog-v2-internal

  app:
    build:
      context: ../../core/services/backend
      dockerfile: ../../../config/dockerfiles/backend.Dockerfile
    container_name: joaog-v2-app
    restart: unless-stopped
    env_file:
      - ./credentials/backend.joaog-v2.env
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - joaog-v2-internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 30s

  ai-worker:
    build:
      context: ../../core/services/ai-worker
      dockerfile: ../../../config/dockerfiles/ai-worker.Dockerfile
    container_name: joaog-v2-ai-worker
    restart: unless-stopped
    env_file:
      - ./credentials/ai-worker.joaog-v2.env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - joaog-v2-internal

  frontend:
    build:
      context: ../../core/services/frontend
      dockerfile: ../../../config/dockerfiles/frontend.Dockerfile
    container_name: joaog-v2-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - joaog-v2-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  joaog_v2_postgres_data:
    name: joaog_v2_postgres_data
  joaog_v2_redis_data:
    name: joaog_v2_redis_data
  joaog_v2_rabbitmq_data:
    name: joaog_v2_rabbitmq_data
  joaog_v2_minio_data:
    name: joaog_v2_minio_data
  joaog_v2_qdrant_data:
    name: joaog_v2_qdrant_data

networks:
  joaog-v2-internal:
    name: joaog-v2-internal
    driver: bridge
